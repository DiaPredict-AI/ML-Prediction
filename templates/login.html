<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diabetes Intelligence Platform</title>
    <!-- Inside <head> -->
    <!-- Load Local Lucide Icon Library -->
    <script src="{{ url_for('static', filename='js/lucide.js') }}"></script>
    <!-- <script src="https://unpkg.com/lucide@latest"></script> -->

    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            /* Slate 900 */
            background-image: linear-gradient(to bottom right, #1e3a8a, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* --- LOGIN CARD (Glassmorphism) --- */
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 0 20px;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- HEADER --- */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #94a3b8;
            /* Slate 400 */
            font-size: 0.875rem;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .form-group svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 20px;
            height: 20px;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            /* Left padding for icon */
            background: rgba(30, 41, 59, 0.5);
            /* Slate 800 with opacity */
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        /* --- BUTTONS & LINKS --- */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.875rem;
            color: #60a5fa;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }

        .forgot-link:hover {
            color: #93c5fd;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(to right, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .signup-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .signup-text a {
            color: white;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <div class="icon-circle">
                <i data-lucide="activity"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to access your health dashboard</p>
        </div>

        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}

        <form action="/dashboard" method="POST">
            <div class="form-group">
                <i data-lucide="user"></i>
                <input type="text" name="username" class="form-input" placeholder="Username / Email" required>
            </div>

            <div class="form-group">
                <i data-lucide="lock"></i>
                <input type="password" name="password" class="form-input" placeholder="Password" required>
            </div>

            <a href="#" class="forgot-link">Forgot Password?</a>

            <button type="submit" class="submit-btn">
                Sign In
            </button>
        </form>

        <div class="signup-text">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
