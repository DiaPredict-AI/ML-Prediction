<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Diagram Maker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Mermaid.js -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        window.mermaid = mermaid;
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .editor-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Error Box Animation */
        .error-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                <i class="ph ph-tree-structure text-2xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Diagram Maker</h1>
                <p class="text-xs text-gray-500">Text-to-Diagram Generator</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden md:flex items-center bg-gray-100 rounded-md p-1">
                <button onclick="setTheme('light')"
                    class="px-3 py-1 rounded text-sm font-medium bg-white shadow-sm text-gray-700">Light</button>
                <button onclick="setTheme('dark')"
                    class="px-3 py-1 rounded text-sm font-medium text-gray-500 hover:text-gray-700">Dark</button>
            </div>
            <button onclick="exportImage('svg')"
                class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
                <i class="ph ph-download-simple"></i> SVG
            </button>
            <button onclick="exportImage('png')"
                class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-sm transition-colors">
                <i class="ph ph-image"></i> PNG
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

        <!-- Editor Section -->
        <div class="w-full md:w-1/3 flex flex-col border-r border-gray-200 bg-white">
            <!-- Toolbar -->
            <div class="px-4 py-2 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Editor</span>
                <div class="relative group">
                    <button class="flex items-center gap-1 text-xs font-medium text-indigo-600 hover:text-indigo-800">
                        Load Template <i class="ph ph-caret-down"></i>
                    </button>
                    <!-- Dropdown -->
                    <div
                        class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-100 hidden group-hover:block z-20 overflow-hidden">
                        <button onclick="loadTemplate('flowchart')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">Flowchart</button>
                        <button onclick="loadTemplate('sequence')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">Sequence
                            Diagram</button>
                        <button onclick="loadTemplate('class')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">Class
                            Diagram</button>
                        <button onclick="loadTemplate('state')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">State
                            Diagram</button>
                        <button onclick="loadTemplate('er')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">ER
                            Diagram</button>
                        <button onclick="loadTemplate('gantt')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">Gantt
                            Chart</button>
                        <button onclick="loadTemplate('mindmap')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">Mind
                            Map</button>
                        <button onclick="loadTemplate('userJourney')"
                            class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-50 text-gray-700">User
                            Journey</button>
                    </div>
                </div>
            </div>

            <!-- Text Area -->
            <textarea id="code-input"
                class="flex-1 w-full p-4 resize-none outline-none editor-font text-sm leading-relaxed text-gray-700 bg-white"
                placeholder="Enter Mermaid syntax here..." spellcheck="false"></textarea>
        </div>

        <!-- Preview Section -->
        <div class="w-full md:w-2/3 flex flex-col bg-gray-50 relative">
            <div class="px-4 py-2 border-b border-gray-200 bg-white flex items-center justify-between shadow-sm">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Preview</span>
                <div class="flex items-center gap-2">
                    <span id="status-indicator"
                        class="flex items-center gap-1.5 text-xs text-green-600 font-medium transition-opacity duration-300">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Synced
                    </span>
                    <button onclick="togglePanZoom()" class="p-1.5 rounded hover:bg-gray-100 text-gray-500"
                        title="Reset View">
                        <i class="ph ph-arrows-out"></i>
                    </button>
                </div>
            </div>

            <!-- Diagram Container -->
            <div id="diagram-container"
                class="flex-1 overflow-auto flex items-center justify-center p-8 bg-gray-50/50 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
                <div id="diagram-output" class="transition-all duration-300 transform origin-center"></div>
            </div>

            <!-- Error Notification -->
            <div id="error-box"
                class="absolute bottom-4 left-4 right-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg shadow-lg hidden">
                <div class="flex items-start gap-3">
                    <i class="ph ph-warning-circle text-xl shrink-0 mt-0.5"></i>
                    <div>
                        <h3 class="font-bold text-sm">Syntax Error</h3>
                        <p id="error-message" class="text-sm mt-1 opacity-90 font-mono"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Templates ---
        const templates = {
            flowchart: `graph TD
    A[Start] --> B{Is it working?}
    B -- Yes --> C[Great!]
    B -- No --> D[Debug it]
    D --> B`,
            sequence: `sequenceDiagram
    participant U as User
    participant S as Server
    participant DB as Database
    
    U->>S: Request Data
    activate S
    S->>DB: Query
    activate DB
    DB-->>S: Results
    deactivate DB
    S-->>U: Response
    deactivate S`,
            class: `classDiagram
    class Animal {
        +String name
        +int age
        +eat()
        +sleep()
    }
    class Dog {
        +bark()
    }
    class Cat {
        +meow()
    }
    Animal <|-- Dog
    Animal <|-- Cat`,
            state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Processing : Submit
    Processing --> Success : OK
    Processing --> Error : Fail
    Success --> Idle : Reset
    Error --> Idle : Reset`,
            er: `erDiagram
    CUSTOMER ||--o{ ORDER : places
    ORDER ||--|{ LINE-ITEM : contains
    CUSTOMER }|..|{ DELIVERY-ADDRESS : uses`,
            gantt: `gantt
    title Project Timeline
    dateFormat  YYYY-MM-DD
    section Design
    Wireframes      :a1, 2023-10-01, 5d
    UI Design       :after a1, 5d
    section Dev
    Backend         :2023-10-10, 10d
    Frontend        :2023-10-12, 10d`,
            mindmap: `mindmap
  root((Project))
    Planning
      Research
      Budget
    Development
      Frontend
      Backend
    Marketing
      Social Media
      Ads`,
            userJourney: `journey
    title My working day
    section Go to work
      Wake up: 5: Me
      Brush teeth: 3: Me
      Drive: 1: Me, Car
    section Work
      Check mail: 5: Me
      Coding: 7: Me`
        };

        // --- Configuration ---
        const input = document.getElementById('code-input');
        const output = document.getElementById('diagram-output');
        const errorBox = document.getElementById('error-box');
        const errorMessage = document.getElementById('error-message');
        const statusIndicator = document.getElementById('status-indicator');

        // Initial Config for Mermaid
        const mermaidConfig = {
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            flowchart: { curve: 'basis' }
        };

        let currentCode = '';
        let timeoutId = null;

        // --- Core Functions ---

        async function initApp() {
            // Load from local storage or default
            const savedCode = localStorage.getItem('mermaidCode');
            input.value = savedCode || templates.flowchart;

            // Wait for Mermaid module to load
            const checkMermaid = setInterval(() => {
                if (window.mermaid) {
                    clearInterval(checkMermaid);
                    window.mermaid.initialize(mermaidConfig);
                    renderDiagram();
                }
            }, 100);
        }

        async function renderDiagram() {
            const code = input.value;
            currentCode = code;

            // Save to local storage
            localStorage.setItem('mermaidCode', code);

            // UI Feedback
            statusIndicator.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Rendering...';
            statusIndicator.className = "flex items-center gap-1.5 text-xs text-blue-600 font-medium";

            try {
                // Check if code is empty
                if (!code.trim()) {
                    output.innerHTML = '';
                    statusIndicator.innerHTML = 'Empty';
                    return;
                }

                // Mermaid Render
                // We generate a unique ID for the SVG to avoid conflicts
                const id = 'mermaid-' + Math.round(Math.random() * 10000);
                const { svg } = await window.mermaid.render(id, code);

                output.innerHTML = svg;

                // Hide error box if successful
                errorBox.classList.add('hidden');

                // Success Status
                statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> Synced';
                statusIndicator.className = "flex items-center gap-1.5 text-xs text-green-600 font-medium";

            } catch (error) {
                console.error('Mermaid Error:', error);

                // Show friendly error
                errorBox.classList.remove('hidden');
                errorMessage.textContent = error.message || "Syntax error in diagram definition.";

                // Keep the previous valid diagram if possible, or clear? 
                // Usually better to keep the old one so user can see what they are fixing, 
                // but Mermaid 10 sometimes renders error text directly. 
                // We'll trust the custom error box for now.

                statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> Error';
                statusIndicator.className = "flex items-center gap-1.5 text-xs text-red-600 font-medium";
            }
        }

        function handleInput() {
            // Debounce rendering (wait 500ms after typing stops)
            clearTimeout(timeoutId);
            timeoutId = setTimeout(renderDiagram, 500);
        }

        function loadTemplate(type) {
            if (confirm("This will overwrite your current code. Continue?")) {
                input.value = templates[type];
                renderDiagram();
            }
        }

        function setTheme(theme) {
            // Simple theme switching for Mermaid
            // Note: This requires re-initializing or tweaking config. 
            // For this mini-app, we will stick to a neutral default for simplicity 
            // but update the background to simulate "DarkMode" if requested.

            const mainBg = document.querySelector('main');

            if (theme === 'dark') {
                mermaidConfig.theme = 'dark';
                document.body.classList.add('dark-mode'); // Could add more custom dark classes
                // Re-render to apply mermaid theme
                window.mermaid.initialize({ ...mermaidConfig, theme: 'dark' });
            } else {
                mermaidConfig.theme = 'default';
                document.body.classList.remove('dark-mode');
                window.mermaid.initialize({ ...mermaidConfig, theme: 'default' });
            }
            renderDiagram();
        }

        function exportImage(type) {
            const svgElement = output.querySelector('svg');
            if (!svgElement) {
                alert("No diagram to export!");
                return;
            }

            // Get dimensions from viewBox for accuracy (fixes scaling issues)
            const viewBox = svgElement.getAttribute('viewBox');
            let width, height;

            if (viewBox) {
                const parts = viewBox.split(/\s+|,/).filter(n => n.trim() !== '').map(parseFloat);
                if (parts.length >= 4) {
                    width = parts[2];
                    height = parts[3];
                }
            }

            // Fallback if viewBox is missing or invalid
            if (!width || !height) {
                const bbox = svgElement.getBoundingClientRect();
                width = bbox.width || 1200; // Default fallback
                height = bbox.height || 800;
            }

            // 2x Scale for high resolution
            const scale = 2;
            const exportWidth = Math.ceil(width * scale);
            const exportHeight = Math.ceil(height * scale);

            // Clone SVG to modify attributes for export without breaking UI
            const clone = svgElement.cloneNode(true);
            clone.setAttribute('width', exportWidth);
            clone.setAttribute('height', exportHeight);
            clone.style.maxWidth = 'none'; // remove CSS constraints

            // Explicitly set white background on the SVG for consistency
            clone.style.backgroundColor = '#ffffff';

            // Serialize
            const svgData = new XMLSerializer().serializeToString(clone);
            const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(svgBlob);

            if (type === 'svg') {
                downloadLink(url, `diagram.svg`);
                // Revoke after a delay to ensure download starts
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                return;
            }

            // PNG Export logic
            const canvas = document.createElement("canvas");
            canvas.width = exportWidth;
            canvas.height = exportHeight;
            const ctx = canvas.getContext("2d");
            const img = new Image();

            // Notify user of processing (since PNG generation is async)
            const btn = document.querySelector('button[onclick="exportImage(\'png\')"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Saving...';
            btn.disabled = true;

            img.onload = () => {
                // Fill white background (Canvas is transparent by default)
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw image
                ctx.drawImage(img, 0, 0);

                try {
                    const pngUrl = canvas.toDataURL("image/png");
                    downloadLink(pngUrl, `diagram.png`);
                } catch (e) {
                    console.error("Export failed", e);
                    alert("Error creating PNG. Security restrictions may apply to the diagram content.");
                }

                // Cleanup
                URL.revokeObjectURL(url);
                btn.innerHTML = originalText;
                btn.disabled = false;
            };

            img.onerror = (e) => {
                console.error("Image load error", e);
                alert("Failed to render SVG for export.");
                URL.revokeObjectURL(url);
                btn.innerHTML = originalText;
                btn.disabled = false;
            };

            img.src = url;
        }

        function downloadLink(url, filename) {
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;

            // Must be appended to body for Firefox/some browsers
            document.body.appendChild(a);

            // Programmatic click
            a.click();

            // Clean up
            setTimeout(() => {
                document.body.removeChild(a);
            }, 100);
        }

        function togglePanZoom() {
            // Simple reset for this version. 
            // Full pan/zoom libraries (like svg-pan-zoom) can be heavy for a mini-app.
            // We just re-center by re-rendering.
            renderDiagram();
        }

        // --- Event Listeners ---
        input.addEventListener('input', handleInput);

        // --- Init ---
        initApp();

    </script>
</body>

</html>
